backend:
  name: github
  repo: dickytunes/ppm
  branch: master
  auth_type: pkce
  app_id: "Ov23lid7cVp43gNV82f8"

media_folder: "web/public/uploads"
public_folder: "/uploads"

collections:
  - name: "caseStudies"
    label: "Case Studies"
    folder: "web/content/case-studies"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "slug", label: "Slug", widget: "string" }
      - { name: "summary", label: "Summary (listing card)", widget: "text" }
      - { name: "technologies", label: "Technologies", widget: "list", field: { name: "tech", label: "Technology", widget: "string" } }
      - { name: "role", label: "Role", widget: "string" }
      - { name: "images", label: "Images", widget: "list", field: { name: "image", label: "Image", widget: "image" } }
      - label: "Problem Card"
        name: "problem"
        widget: "object"
        fields:
          - { name: "problemHeadline", label: "Headline", widget: "string" }
          - { name: "problemDescription", label: "Description", widget: "text" }
          - { name: "problemQuote", label: "Pull quote (optional)", widget: "string", required: false }
      - label: "Approach Card"
        name: "approach"
        widget: "object"
        fields:
          - { name: "approachHeadline", label: "Headline", widget: "string" }
          - { name: "approachDescription", label: "Description", widget: "text" }
          - { name: "approachSteps", label: "Checklist steps", widget: "list", field: { name: "step", label: "Step", widget: "string" } }
      - label: "Outcome Card"
        name: "outcome"
        widget: "object"
        fields:
          - { name: "outcomeMetric", label: "Metric (e.g. 40%)", widget: "string" }
          - { name: "outcomeMetricLabel", label: "Metric label (e.g. Faster Deployment)", widget: "string" }
          - { name: "outcomeDescription", label: "Description", widget: "text" }
      - { name: "body", label: "Supplemental body (optional)", widget: "markdown", required: false }
      - { name: "links", label: "Links", widget: "list", fields: [
          { name: "label", label: "Label", widget: "string" },
          { name: "url", label: "URL", widget: "string" }
        ]
        }

  - name: "companies"
    label: "Footer Companies"
    folder: "web/content/companies"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: "companyName", label: "Company Name", widget: "string" }
      - { name: "logo", label: "Logo", widget: "image" }
      - { name: "url", label: "URL", widget: "string", required: false }
      - { name: "order", label: "Order", widget: "number" }

  - name: "settings"
    label: "Profile & Settings"
    folder: "web/content/settings"
    create: false
    fields:
      - { name: "name", label: "Name", widget: "string" }
      - { name: "roles", label: "Roles", widget: "list", field: { name: "role", label: "Role", widget: "string" } }
      - { name: "shortBio", label: "Short Bio", widget: "text" }
      - { name: "socialLinks", label: "Social Links", widget: "list", fields: [
          { name: "label", label: "Label", widget: "string" },
          { name: "url", label: "URL", widget: "string" }
        ]
        }
      - { name: "navItems", label: "Navigation Items", widget: "list", fields: [
          { name: "label", label: "Label", widget: "string" },
          { name: "iconId", label: "Icon ID", widget: "string" },
          { name: "route", label: "Route", widget: "string" }
        ]
        }
